<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Local de Coleta - EcoColeta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <i class="fas fa-leaf"></i>
            <input type="text" class="search-input" placeholder="Pesquisa por nome:">
            <input type="text" class="search-input" placeholder="CEP:">
        </div>

        <div class="sidebar">
            <i class="fas fa-map-pin"></i>
            <i class="fas fa-clock"></i>
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <div class="form-container">
            <h2><i class="fas fa-plus-circle"></i> Pedido de Coleta de Lixo Especial</h2>
            
            <form id="add-location-form" class="form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome do Requerinte</label>
                        <input type="text" id="nome" placeholder="Ex: Pedro" required>
                    </div>
                    <div class="form-group">
                        <label for="tipo">Tipo de Resíduo Especial</label>
                        <select id="tipo" required>
                            <option value="">Selecione o tipo</option>
                            <option value="eletronicos">Eletrônicos e Computadores</option>
                            <option value="pilhas">Pilhas e Baterias</option>
                            <option value="oleo">Óleo de Cozinha</option>
                            <option value="lampadas">Lâmpadas Fluorescentes</option>
                            <option value="quimicos">Resíduos Químicos / Tintas</option>
                            <option value="medicamentos">Medicamentos Vencidos</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" placeholder="Rua, Avenida..." required>
                    </div>
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" placeholder="123" style="width: 120px;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Centro">
                    </div>
                </div>

                <div class="form-group">
                    <label for="capacidade">Capacidade Estimada (kg/mês)</label>
                    <input type="number" id="capacidade" placeholder="500" min="1">
                </div>

                <div class="form-group">
                    <label for="horarios">Horários de Funcionamento / Coleta</label>
                    <input type="text" id="horarios" placeholder="Seg-Sex 08:00-17:00 | Sáb 08:00-12:00">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição Adicional</label>
                    <textarea id="descricao" rows="4" placeholder="Ex: Ponto de entrega gratuito, com acessibilidade..."></textarea>
                </div>

                <div class="form-group">
                    <label for="foto">Foto do Local (opcional)</label>
                    <input type="file" id="foto" accept="image/*">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> Realizar Pedido de Coleta
                </button>
            </form>
        </div>
    </div>
</body>
</html>
